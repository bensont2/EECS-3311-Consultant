{% extends 'base.html' %}
{% block content %}
<h2>My Bookings</h2>
<table>
    <tr><th>ID</th><th>Service</th><th>Status</th><th>Actions</th></tr>
    {% for b in bookings %}
    <tr>
        <td>{{ b.id }}</td>
        <td>{{ b.service.name }}</td>
        <td><span class="badge {{ b.status }}">{{ b.status }}</span></td>
        <td>
            <form method="POST" action="/client/cancel/{{ b.id }}" style="display:inline;">
                <button type="submit">Cancel</button>
            </form>
            {% if b.status == 'Pending Payment' %}
                <a href="/client/payment/{{ b.id }}"><button>Pay Now</button></a>
            {% endif %}
        </td>
    </tr>
    {% endfor %}
</table>
{% endblock %}
