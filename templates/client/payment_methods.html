{% extends 'base.html' %}
{% block content %}
<h2>Payment Methods</h2>
<form method="POST">
    <input type="text" name="label" placeholder="e.g. Personal Visa" required>
    <input type="text" name="card_number" placeholder="Card Number" required>
    <button type="submit">Add Method</button>
</form>
<ul>
{% for m in methods %}
    <li>{{ m.display_label }} 
        <form method="POST" action="/client/payment-methods/{{ m.id }}" style="display:inline;">
            <button type="submit">Remove</button>
        </form>
    </li>
{% endfor %}
</ul>
{% endblock %}
